vich_uploader:
    db_driver: orm
    mappings:
        establishment_images:
            uri_prefix: /uploads/establishments
            upload_destination: '%kernel.project_dir%/public/uploads/establishments'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            directory_namer: App\Upload\EstablishmentImageDirectoryNamer
            delete_on_remove: true
            delete_on_update: true
            inject_on_load: false
