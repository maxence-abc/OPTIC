security:
    # Hiérarchie des rôles
    role_hierarchy:
        ROLE_CLIENT: [ROLE_USER]
        ROLE_PRO: [ROLE_USER]
        ROLE_ADMIN_PRO: [ROLE_PRO, ROLE_USER]
        ROLE_ADMIN: [ROLE_ADMIN_PRO, ROLE_PRO, ROLE_USER]

    # Gestion du hachage des mots de passe
    password_hashers:
        App\Entity\User:
            algorithm: auto


    # Provider basé sur ton entité User (connexion avec l'email)
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
        # used to reload user from session & other features (e.g. switch_user)

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserStatusChecker
            custom_authenticator: App\Security\AppAuthenticator
            logout:
                path: app_logout
                target: /

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                #always_remember_me: true

    # Règles d'accès
    access_control:
    - { path: ^/reset-password, roles: PUBLIC_ACCESS }
    - { path: ^/login, roles: PUBLIC_ACCESS }
    - { path: ^/registration, roles: PUBLIC_ACCESS }
    - { path: ^/$, roles: PUBLIC_ACCESS }
    - { path: ^/home, roles: PUBLIC_ACCESS }

    # Devenir partenaire => accessible aux comptes connectés PRO
    # et c'est le wizard qui fera l'upgrade en ROLE_ADMIN_PRO à la fin.
    - { path: ^/devenir-partenaire, roles: ROLE_PRO }
    - { path: ^/partner/onboarding, roles: ROLE_PRO }

    - { path: ^/admin, roles: ROLE_ADMIN }
    - { path: ^/pro, roles: ROLE_PRO }
    - { path: ^/manager, roles: ROLE_ADMIN_PRO }

    # Le reste du site : connecté
    - { path: ^/, roles: ROLE_USER }


        

when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: auto
                cost: 4      # bcrypt
                time_cost: 3 # argon
                memory_cost: 10 # argon
