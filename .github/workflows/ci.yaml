name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    env:
      APP_SECRET: ci_app_secret
      CADDY_MERCURE_JWT_SECRET: ci_mercure_secret_key_for_tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        uses: docker/bake-action@v6
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.prod.yaml
          set: |
            *.cache-from=type=gha,scope=${{ github.ref }}
            *.cache-from=type=gha,scope=refs/heads/main
            *.cache-to=type=gha,scope=${{ github.ref }},mode=max

      - name: Start services
        run: docker compose -f compose.yaml -f compose.prod.yaml up --wait --no-build

      - name: Check HTTP reachability
        run: curl -v --fail-with-body http://localhost

      - name: Check HTTPS reachability
        if: false # Remove this line when the homepage is configured, or change the path to check
        run: curl -v --insecure --fail-with-body https://localhost

      - name: Check Mercure reachability
        run: curl -vI --insecure --fail-with-body https://localhost/.well-known/mercure?topic=test

      - name: Create test database
        if: false # Remove this line if Doctrine ORM is installed
        run: docker compose -f compose.yaml -f compose.prod.yaml exec -T php bin/console -e test doctrine:database:create

      - name: Run migrations
        if: false # Remove this line if Doctrine Migrations is installed
        run: docker compose -f compose.yaml -f compose.prod.yaml exec -T php bin/console -e test doctrine:migrations:migrate --no-interaction

      - name: Doctrine Schema Validator
        if: false # Remove this line if Doctrine ORM is installed
        run: docker compose -f compose.yaml -f compose.prod.yaml exec -T php bin/console -e test doctrine:schema:validate

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f compose.yaml -f compose.prod.yaml logs --no-color php database selenium

      - name: Stop services
        if: always()
        run: docker compose -f compose.yaml -f compose.prod.yaml down -v