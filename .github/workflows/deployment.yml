name: Optic Deployment

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ "Optic CI" ]
    types:
      - completed

permissions:
  contents: read

jobs:
  deployment:
    name: Deployment with VPN
    environment: VPN_USER
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          VPN_CONFIG: ${{ secrets.VPN_CONFIG }}
          VPN_USER: ${{ secrets.VPN_USER }}
          VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0

          for secret_name in VPN_CONFIG VPN_USER VPN_PASSWORD SSH_HOST SSH_USER SSH_PASSWORD; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Secret ${secret_name} is missing or empty in environment VPN_USER."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          case "$SSH_HOST" in
            *"@"*|http://*|https://*|*":"*)
              echo "::error::SSH_HOST must contain only a hostname or IP address, without user, protocol, or port."
              exit 1
              ;;
          esac

      - name: Install OpenVPN and sshpass
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openvpn sshpass

      - name: Create VPN config and credentials
        run: |
          set -euo pipefail
          echo "${{ secrets.VPN_CONFIG }}" > vpn.conf
          printf "%s\n%s\n" "${{ secrets.VPN_USER }}" "${{ secrets.VPN_PASSWORD }}" > vpn.auth
          sed -i 's|auth-user-pass|auth-user-pass vpn.auth|' vpn.conf
          chmod 600 vpn.conf vpn.auth

      - name: Start VPN
        run: |
          set -euo pipefail
          sudo openvpn --config vpn.conf --daemon
          sleep 10
          ip a  # debug

      - name: Deploy with SSH using password
        run: |
          set -euo pipefail
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
            set -euo pipefail
            cd ./Optic-symfony/
            git checkout main
            git pull --ff-only origin main
            make deploy
          EOF

      - name: Affichage si le déploiement échoue
        if: failure()
        run: |
          echo ""
          echo " DÉPLOIEMENT ÉCHOUÉ "
          echo "Branche       : ${{ github.event.workflow_run.head_branch }}"
          echo "Auteur        : ${{ github.event.workflow_run.head_commit.author.name }}"
          echo "Voir les logs : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""

      - name: Affichage si le déploiement réussit
        if: success()
        run: |
          echo ""
          echo " DÉPLOIEMENT RÉUSSI "
          echo "Branche       : ${{ github.event.workflow_run.head_branch }}"
          echo "Auteur        : ${{ github.event.workflow_run.head_commit.author.name }}"
          echo "Voir les logs : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
